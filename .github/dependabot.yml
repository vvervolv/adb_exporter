version: 2
updates:
  # Keep GitHub Actions pinned-by-SHA references up to date (Dependabot bumps the
  # SHA and updates the trailing # vX.Y.Z comment).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Keep Go module dependencies current, including security patches.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      go-modules:
        patterns: ["*"]
