name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: go test -race
        run: make test

      - name: go build
        run: make build
