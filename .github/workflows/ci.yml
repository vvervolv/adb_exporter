name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny by default at the workflow level; grant the minimum per job.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: go test -race
        run: make test

      - name: go build
        run: make build
