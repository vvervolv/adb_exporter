name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny by default at the workflow level; grant the minimum per job.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: go test -race
        run: make test

      - name: go build
        run: make build
