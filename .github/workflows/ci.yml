name: CI

on:
  push:
    branches: [main]
  pull_request:

# Deny by default at the workflow level; grant the minimum per job.
permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.24'
          cache: true

      - name: gofmt check
        run: make fmt-check

      - name: go vet
        run: make vet

      - name: go test -race
        run: make test

      - name: go build
        run: make build
